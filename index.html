<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS LineUp</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    
    

    <!-- Main Content -->
    <main class="main">

        <!-- SideBar Map -->
        <aside class="sidebar-left">
            <h2>Maps</h2>
            <ul id="map-list">
                <li data-map="mirage">Mirage</li>
                <li data-map="dust2">Dust2</li>
                <li data-map="nuke">Nuke</li>
                <li data-map="anubis">Anubis</li>
                <li data-map="overpass">Overpass</li>
                <li data-map="ancient">Ancient</li>
                <li data-map="vertigo">Vertigo</li>
                <li data-map="train">Train</li>
                <li data-map="cache">Cache</li>
                <li data-map="inferno">Inferno</li>
                <li data-map="sanctum">Sanctum</li>
            </ul>
            <div class="switch-row">
                <label class="switch">
                    <input type="checkbox" id="toggle-nades" checked>
                    <span class="slider"></span>
                </label>
                <span class="switch-text">Show Nades</span>
            </div>

            <button id="edit-mode-btn" class="edit-mode-btn">Edit Mode</button>

        </aside>

        <!-- Homepage -->
        <div id="home">
            <h1>CS LineUp</h1>
            <p>Select a map to get started!</p>
        </div>

        <!-- Central Map Container -->
        <section class="map-section">
            <div id="map-container">
                <img id="map-image" src="assets/maps/anubis.png" alt="Map">
                <div id="points-container"></div>
            </div>
        </section>


        <!-- Edit Panel -->
        <div id="edit-panel" class="hidden">
            <div id="edit-panel-header">Edit Mode</div>

            <p id="edit-step">Click on the map to set the land position</p>

            <label>Name:</label>
            <input id="edit-title" type="text" placeholder="Enter lineup name">

            <label>Throw Type:</label>
            <select id="edit-type">
                <option value="smoke">Smoke</option>
                <option value="flash">Flash</option>
                <option value="he">HE</option>
                <option value="molly">Molotov</option>
            </select>

            <label>Throw Type:</label>
            <input id="edit-throw" type="text" placeholder="Enter throw type">

            <input id="edit-placement-path" type="hidden">
            <p id="edit-placement-info" style="font-size: 12px; opacity: 0.7;"></p>

            <button id="edit-save-btn" class="edit-btn">Save</button>
            <button id="edit-copy-btn" class="edit-btn">Copy JSON</button>
            <button id="edit-cancel-btn" class="edit-btn danger">Cancel</button>


            <textarea id="edit-output" readonly></textarea>

        </div>



        <!-- SideBar lineup -->
            <aside class="sidebar-right">
                <h2>Lineups</h2>

                <div id="lineup-block" class="hidden">
                    <div id="lineup-images">
                        <img id="lineup-placement" src="" alt="Placement">
                        <img id="lineup-aim" src="" alt="Aim">
                    </div>

                    <p id="lineup-throw" class="throw-text"></p>

                    <a id="lineup-video" href="#" target="_blank" class="hidden">Voir la vidéo</a>
                </div>
            </aside>

        <div id="debug-coords" class="hidden"></div>
    </main>

    <!-- JS -->
    <script src="js/app.js"></script>
    <script src="js/data.js"></script>

</body>
</html>
